services:
  - type: web
    name: itechzone-api
    env: node
    region: singapore
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Điền thủ công trên Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render tự gen secret ngẫu nhiên
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false          # Điền URL Vercel sau khi deploy frontend
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: STAFF_EMAIL
        sync: false
      - key: STAFF_PASSWORD
        sync: false
      - key: STAFF_NAME
        sync: false
